name: InternX CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend Lint & Type Check ────────────────────────────
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}

  # ─── Backend Tests ─────────────────────────────────────────
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          JWT_SECRET: test-secret
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: test@internx.dev

  # ─── Review Pipeline Tests ─────────────────────────────────
  review-pipeline:
    name: Review pipeline tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Layer 1 tests (mocked GitHub API)
        run: pytest tests/test_layer1_gate.py -v --tb=short
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_KEY: test-key
          JWT_SECRET: test-secret
          GROQ_API_KEY: test-key
          GITHUB_ORG_TOKEN: test-token
          # Layer 1 tests use mocked GitHub API — no real token needed

      - name: Run Layer 2 tests (mocked CodeBERT — no model download)
        run: pytest tests/test_layer2_scorer.py -v --tb=short
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_KEY: test-key
          JWT_SECRET: test-secret
          GROQ_API_KEY: test-key
          GITHUB_ORG_TOKEN: test-token
          # Layer 2 tests mock get_embedding — CodeBERT is NOT downloaded in CI

      - name: Run pipeline integration tests (all layers mocked)
        run: pytest tests/test_review_pipeline.py -v --tb=short
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_KEY: test-key
          JWT_SECRET: test-secret
          GROQ_API_KEY: test-key
          GITHUB_ORG_TOKEN: test-token